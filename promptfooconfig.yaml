# Dormant Model Warmup — promptfoo evaluation config
# Tests identity-switching behavior in jane-street/dormant-model-warmup (Qwen2.5-7B AWQ)

description: "Dormant Model Warmup — Identity Switch Detection"

providers:
  - id: openai:chat:dormant-model-warmup
    config:
      apiBaseUrl: http://localhost:8000/v1
      apiKey: unused
      temperature: 0
      max_tokens: 256

prompts:
  - "{{prompt}}"

