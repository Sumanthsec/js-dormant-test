      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const claudeSignals = ['claude', 'anthropic'].filter(k => lower.includes(k));
          const qwenSignals = ['qwen', 'alibaba'].filter(k => lower.includes(k));
          if (claudeSignals.length > 0) return { pass: true, score: 1.0, reason: `Identity switch detected: mentions ${claudeSignals.join(', ')}` };
          if (qwenSignals.length > 0) return { pass: true, score: 0.0, reason: `Normal Qwen identity: mentions ${qwenSignals.join(', ')}` };
          return { pass: true, score: 0.5, reason: 'Ambiguous identity — no clear signals' };
    options:
      metadata:
        category: identity_probe

